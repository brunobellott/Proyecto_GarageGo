<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Configuración</title>

    <link rel="stylesheet" href="../../styles/estilosPerfil/menuPerfil.css" />

    <!-- LINE AWESOME -->

    <link
      rel="stylesheet"
      href="https://maxst.icons8.com/vue-static/landings/line-awesome/line-awesome/1.3.0/css/line-awesome.min.css"
    />
  </head>

  <body>
    <!-- HEADER -->

    <header class="page-header">
      <h1>Configuración</h1>
    </header>

    <!-- SETTINGS SWITCHES -->

    <section class="settings-list">
      <!-- DARK MODE -->

      <div class="setting-item">
        <div class="setting-left">
          <i class="las la-moon"></i>

          <span>Modo oscuro</span>
        </div>

        <label class="ios-switch">
          <input type="checkbox" aria-label="Modo oscuro" />

          <span class="switch-slider"></span>
        </label>
      </div>

      <!-- NOTIFICATIONS -->

      <div class="setting-item">
        <div class="setting-left">
          <i class="las la-bell"></i>

          <span>Notificaciones</span>
        </div>
        <div class="vehicle-status">
          <span class="status-text"> Activo </span>

          <label class="ios-switch">
            <input type="checkbox" checked aria-label="Estado del vehículo" />

            <span class="switch-slider"></span>
          </label>
        </div>
      </div>
    </section>

    <!-- CONFIGURATION OPTIONS -->

    <section class="profile-section">
      <h4 class="section-heading">CONFIGURACIÓN</h4>

      <div class="grid-options three-cols">
        <!-- SECURITY -->

        <a href="#" class="grid-item">
          <div class="grid-icon color-5">
            <i class="las la-shield-alt"></i>
          </div>

          <span class="grid-label"> Seguridad </span>
        </a>

        <!-- SUPPORT -->

        <a href="#" class="grid-item">
          <div class="grid-icon color-6">
            <i class="las la-headset"></i>
          </div>

          <span class="grid-label"> Soporte y Ayuda </span>
        </a>

        <!-- LEGAL -->

        <a href="#" class="grid-item">
          <div class="grid-icon color-7">
            <i class="las la-file-contract"></i>
          </div>

          <span class="grid-label"> Legal </span>
        </a>
      </div>
    </section>

    <!-- CRITICAL ACTIONS -->

    <section class="profile-critical-options">
      <!-- LOGOUT -->

      <a href="../../pages/login/index.html" class="critical-item logout-red">
        <div class="critical-icon">
          <i class="las la-sign-out-alt"></i>
        </div>

        <div class="critical-text">
          <span class="critical-label"> Cerrar sesión </span>

          <small class="critical-desc"> Hasta pronto </small>
        </div>
      </a>

      <!-- DELETE ACCOUNT -->

      <a href="#" class="critical-item delete-account">
        <div class="critical-icon">
          <i class="las la-trash-alt"></i>
        </div>

        <div class="critical-text">
          <span class="critical-label"> Eliminar cuenta </span>

          <small class="critical-desc"> Esta acción es irreversible </small>
        </div>
      </a>
    </section>
    <br />
    <button type="button" class="volver" onclick="history.back()">←</button>
  </body>
  <script src="../js/volverPaginas.js"></script>
</html>
