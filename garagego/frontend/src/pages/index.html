<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="DivPrincipal">

    <div class="CajasdeRegistro">

        <!-- LOGO -->
        <img src="img/logo.png" alt="GarageGo" class="logo">

        <h2>INICIAR SESIÓN</h2>

        <form id="loginForm">
        
            <input type="email" id="email" placeholder="EMAIL" required>
        
            <input type="password" id="password" placeholder="CONTRASEÑA" required>
        
            <button type="submit" class="boton">ACCEDER</button>
        
            <button type="button" class="boton secundario" onclick="window.location.href='registro.html'">
                REGISTRARSE
            </button>
        
        </form>

        <p class="registroLink">
            <a href="recuperar.html">¿OLVIDÓ SU CONTRASEÑA?</a>
        </p>

    </div>

</div>

</body>

<script>
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch("http://localhost:3000/login", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();

  if (data.success) {
    window.location.href = "principal.html";
  } else {
    alert(data.message);
  }
});
</script>
</html>
