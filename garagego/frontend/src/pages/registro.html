<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro</title>
    <link
      rel="stylesheet"
      href="../../src/styles/pages/estilosLogin/styles.css"
    />
  </head>

  <body>
    <div class="DivPrincipal">
      <div class="CajasdeRegistro">
        <!-- LOGO -->
        <img
          src="../../public/assets/icons/logo.png"
          alt="GarageGo"
          class="logo"
        />

        <h1>REGISTRO</h1>

        <form action="registrar.html" method="POST">
          <!-- Google -->
          <button type="button" class="google-btn">
            <img
              src="../../public/assets/icons/google.png"
              class="google-icon"
            />
            INGRESAR CON GOOGLE
          </button>

          <!-- Inputs -->
          <input type="email" name="mail" placeholder="MAIL" required />

          <input type="text" name="usuario" placeholder="USUARIO" required />

          <input
            type="password"
            name="clave"
            placeholder="CONTRASEÑA"
            required
          />

          <!-- Botones -->
          <div class="acciones">
            <button type="button" class="volver" onclick="history.back()">
              ←
            </button>

            <button type="submit" class="boton">ACCEDER</button>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
