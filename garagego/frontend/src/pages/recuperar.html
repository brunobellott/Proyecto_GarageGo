<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar contraseña</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="DivPrincipal">

    <div class="CajasdeRegistro">

        <!-- LOGO -->
        <img src="img/logo.png" alt="GarageGo" class="logo">

        <h2>RECUPERAR CONTRASEÑA</h2>

    <form id="recuperarForm">
    
        <!-- Inputs -->
        <input type="email" id="email" placeholder="MAIL" required>
    
        <input type="password" id="password" placeholder="NUEVA CONTRASEÑA" required>
    
        <!-- Botones -->
        <div class="acciones">
    
            <button type="button" class="volver" onclick="history.back()">
                ←
            </button>
    
            <button type="submit" class="boton">
                CAMBIAR CONTRASEÑA
            </button>
    
        </div>
    
    </form>

    </div>

</div>

</body>
<script>
    
document.getElementById("recuperarForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const email = document.getElementById("email").value;
  const nuevaPassword = document.getElementById("password").value;

  const res = await fetch("http://localhost:3000/recuperar", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ email, nuevaPassword })
  });

  const data = await res.json();

  if (data.success) {
    alert("Contraseña actualizada");
    window.location.href = "login.html"; // 👈 opcional
  } else {
    alert(data.message);
  }
});

</script>
</html>
