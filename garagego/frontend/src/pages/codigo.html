<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Verificar código</title>

  <link rel="stylesheet" href="../styles/styles.css" />
</head>

<body>

  <div class="DivPrincipal">

    <div class="CajasdeRegistro">

      <!-- LOGO -->
      <img src="../../public/assets/icons/logo.png" alt="GarageGo" class="logo" />

      <p class="recuperarContraseña">
        Hemos enviado un código de verificación
        a su correo electrónico.

        <img class="imageMail" src="../../public/assets/icons/gmail.png" alt="email logo" />
      </p>

      <p class="subtitulo">
        INTRODUCE EL CÓDIGO
      </p>

      <!-- FORM -->
      <form id="codigoForm">

        <!-- Inputs código -->
        <div class="codigo-container">

          <input type="text" maxlength="1" class="codigo" />

          <input type="text" maxlength="1" class="codigo" />

          <input type="text" maxlength="1" class="codigo" />

          <input type="text" maxlength="1" class="codigo" />

          <input type="text" maxlength="1" class="codigo" />

          <input type="text" maxlength="1" class="codigo" />

        </div>

        <!-- BOTÓN -->
        <button type="submit" class="boton">
          VERIFICAR
        </button>

      </form>

      <p class="reenviar">
        VOLVER A ENVIAR EL CÓDIGO
      </p>



    </div>

  </div>

  <!-- SCRIPT -->
  <script>

    document.querySelector("form")
      .addEventListener("submit", async (e) => {

        e.preventDefault();

        const inputs =
          document.querySelectorAll(".codigo");

        let codigo = "";

        inputs.forEach(input => {
          codigo += input.value;
        });

        const email =
          localStorage.getItem(
            "emailRecuperacion"
          );

        const res = await fetch(
          "http://localhost:3000/verificar-codigo",
          {
            method: "POST",

            headers: {
              "Content-Type": "application/json"
            },

            body: JSON.stringify({
              email,
              codigo
            })
          }
        );

        const data = await res.json();

        if (data.success) {

          alert("Código correcto");

          window.location.href =
            "nueva-password.html";

        } else {

          alert("Código incorrecto");
        }

      });

  </script>
</body>

</html>
