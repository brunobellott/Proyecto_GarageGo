<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - GarageGo</title>
    <link rel="stylesheet" href="https://maxst.icons8.com/vue-static/landings/line-awesome/line-awesome/1.3.0/css/line-awesome.min.css">
    <link rel="stylesheet" href="style-principal.css">
</head>
<body class="profile-page-body">

    <main class="profile-page-wrapper">
        
        <!-- CABECERA AMARILLA DE PERFIL (Estilo image_2.png) -->
        <header class="profile-header-card">
            <a href="principal.html" class="back-btn-profile">
                <i class="las la-angle-left"></i>
            </a>
            <div class="profile-main-data">
                <div class="profile-avatar-slot">
                    <img src="img/user_img.png" class="profile-page-avatar">
                    <button class="edit-photo-btn"><i class="las la-camera"></i></button>
                </div>
                <div class="profile-text-info">
                    <h1 class="profile-name">Nombre de Usuario</h1>
                    <span class="profile-email">nombre@garagego.com</span>
                    <div class="vehicles-pill">
                        <i class="las la-car"></i>
                        <span>2 vehículos</span>
                    </div>
                </div>
            </div>
            <button class="edit-profile-btn"><i class="las la-pen"></i></button>
        </header>

        <!-- CONTENIDO SCROLLABLE DE PERFIL -->
        <section class="profile-content">
            
            <!-- TARJETA DE SALDO (Adaptada a amarillo corporativo) -->
            <div class="balance-card-profile">
                <div class="balance-left">
                    <div class="wallet-icon-box">
                        <i class="las la-wallet"></i>
                        <span class="balance-label">Tu Saldo</span>
                    </div>
                    <div class="balance-text">
                        <h2 class="balance-value">$ 0.00</h2>
                    </div>
                </div>
            </div>

            <!-- SECCIÓN CUENTA -->
            <div class="profile-section">
                <h4 class="section-heading">CUENTA</h4>
                <div class="grid-options">
                    <a href="#" class="grid-item">
                        <div class="grid-icon color-1"><i class="las la-user-tie"></i></div>
                        <span class="grid-label">Datos Personales</span>
                    </a>
                    <a href="#" class="grid-item">
                        <div class="grid-icon color-2"><i class="las la-car"></i></div>
                        <span class="grid-label">Mis Vehículos</span>
                    </a>
                    <a href="#" class="grid-item">
                        <div class="grid-icon color-3"><i class="las la-credit-card"></i></div>
                        <span class="grid-label">Métodos de Pago</span>
                    </a>
                    <a href="#" class="grid-item">
                        <div class="grid-icon color-4"><i class="las la-receipt"></i></div>
                        <span class="grid-label">Facturación</span>
                    </a>
                </div>
            </div>

            <!-- SECCIÓN CONFIGURACIÓN -->
            <div class="profile-section">
                <h4 class="section-heading">CONFIGURACIÓN</h4>
                <div class="grid-options three-cols">
                    <a href="#" class="grid-item">
                        <div class="grid-icon color-5"><i class="las la-shield-alt"></i></div>
                        <span class="grid-label">Seguridad</span>
                    </a>
                    <a href="#" class="grid-item">
                        <div class="grid-icon color-6"><i class="las la-headset"></i></div>
                        <span class="grid-label">Soporte y Ayuda</span>
                    </a>
                    <a href="#" class="grid-item">
                        <div class="grid-icon color-7"><i class="las la-file-contract"></i></div>
                        <span class="grid-label">Legal</span>
                    </a>
                </div>
            </div>

            <!-- OPCIONES CRÍTICAS -->
            <div class="profile-critical-options">
                <a href="principal.html" class="critical-item logout-red">
                    <div class="critical-icon"><i class="las la-sign-out-alt"></i></div>
                    <div class="critical-text">
                        <span class="critical-label">Cerrar sesión</span>
                        <small class="critical-desc">Hasta pronto</small>
                    </div>
                </a>
                <a href="#" class="critical-item delete-account">
                    <div class="critical-icon"><i class="las la-trash-alt"></i></div>
                    <div class="critical-text">
                        <span class="critical-label">Eliminar cuenta</span>
                        <small class="critical-desc">Esta acción es irreversible</small>
                    </div>
                </a>
            </div>

        </section>

    </main>

</body>
</html>
