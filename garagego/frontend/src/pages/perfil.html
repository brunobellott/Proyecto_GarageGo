<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Perfil - GarageGo</title>
  <link rel="stylesheet"
    href="https://maxst.icons8.com/vue-static/landings/line-awesome/line-awesome/1.3.0/css/line-awesome.min.css" />
  <link rel="stylesheet" href="/frontend/src/styles/style-principal.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="profile-page-body">
  <main class="profile-page-wrapper">
    <!-- CABECERA AMARILLA DE PERFIL (Estilo image_2.png) -->
    <header class="profile-header-card">
      <a href="/frontend/src/pages/principal.html" class="back-btn-profile">
        <i class="las la-angle-left"></i>
      </a>
      <div class="profile-main-data">
        <div class="profile-avatar-slot">
          <img src="/frontend/public/assets/icons/user_img.png" class="profile-page-avatar" />
          <button class="edit-photo-btn">
            <i class="las la-camera"></i>
          </button>
        </div>
        <div class="profile-text-info">
          <h1 class="profile-name">Nombre de Usuario</h1>
          <span class="profile-email">nombre@garagego.com</span>
          <div class="vehicles-pill">
            <i class="las la-car"></i>
            <span>2 vehículos</span>
          </div>
        </div>
      </div>
      <button class="edit-btn">
        <i data-lucide="pencil"></i>
      </button>
      <button class="settings-btn" onclick="window.location.href = 'configuracion.html'">
        <i data-lucide="settings"></i>
      </button>
    </header>

    <!-- CONTENIDO SCROLLABLE DE PERFIL -->
    <section class="profile-content">
      <!-- TARJETA DE SALDO (Adaptada a amarillo corporativo) -->
      <div class="balance-card-profile">
        <div class="balance-left">
          <div class="wallet-icon-box">
            <i class="las la-wallet"></i>
            <span class="balance-label">Tu Saldo</span>
          </div>
          <div class="balance-text">
            <h2 class="balance-value">$ 0.00</h2>
          </div>
        </div>
      </div>

      <!-- SECCIÓN CUENTA -->
      <div class="profile-section">
        <h4 class="section-heading">CUENTA</h4>
        <div class="grid-options">
          <a href="datosPersonales.html" class="grid-item">
            <div class="grid-icon color-1">
              <i class="las la-user-tie"></i>
            </div>
            <span class="grid-label">Datos Personales</span>
          </a>
          <a href="usuarioVehiculo.html" class="grid-item">
            <div class="grid-icon color-2"><i class="las la-car"></i></div>
            <span class="grid-label">Mis Vehículos</span>
          </a>
          <a href="metodosPagos.html" class="grid-item">
            <div class="grid-icon color-3">
              <i class="las la-credit-card"></i>
            </div>
            <span class="grid-label">Métodos de Pago</span>
          </a>
          <a href="facturacion.html" class="grid-item">
            <div class="grid-icon color-4">
              <i class="las la-receipt"></i>
            </div>
            <span class="grid-label">Facturación</span>
          </a>
        </div>
      </div>
    </section>
  </main>
  <script>
    lucide.createIcons();
  </script>
</body>

</html>
