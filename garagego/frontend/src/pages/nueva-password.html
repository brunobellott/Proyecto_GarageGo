<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="../styles/styles.css" />

  <title>Nueva Contraseña</title>
</head>

<body>

  <div class="DivPrincipal">

    <div class="CajasdeRegistro">

      <!-- LOGO -->
      <img src="../../public/assets/icons/logo.png" alt="GarageGo" class="logo" />

      <form id="recuperarForm">

        <!-- NUEVA PASSWORD -->
        <div class="contenedor-password">

          <input type="password" id="password" placeholder="NUEVA CONTRASEÑA" minlength="6" maxlength="64" required />

          <button type="button" class="btn-password" id="togglePassword">
            👁
          </button>

        </div>

        <!-- CONFIRMAR PASSWORD -->
        <div class="contenedor-password">

          <input type="password" id="confirmPassword" placeholder="CONFIRMAR CONTRASEÑA" minlength="6" maxlength="64"
            required />

          <button type="button" class="btn-password" id="toggleConfirmPassword">
            👁
          </button>

        </div>

        <!-- BOTON -->
        <button type="submit" class="boton">
          CAMBIAR CONTRASEÑA
        </button>

      </form>

    </div>

  </div>

</html>

<script src="/frontend/src/js/verContraseña.js"></script>

<script>

  document.getElementById("recuperarForm")
    .addEventListener("submit", async (e) => {

      e.preventDefault();

      const password =
        document.getElementById("password").value;

      const confirmPassword =
        document.getElementById("confirmPassword").value;

      if (password !== confirmPassword) {

        alert("Las contraseñas no coinciden");
        return;
      }

      const email =
        localStorage.getItem(
          "emailRecuperacion"
        );

      const res = await fetch(
        "http://localhost:3000/nueva-password",
        {
          method: "POST",

          headers: {
            "Content-Type": "application/json"
          },

          body: JSON.stringify({
            email,
            password
          })
        }
      );

      const data = await res.json();

      if (data.success) {

        alert("Contraseña actualizada");

        localStorage.removeItem(
          "emailRecuperacion"
        );

        window.location.href =
          "index.html";

      } else {

        alert("Error");
      }

    });

</script>
