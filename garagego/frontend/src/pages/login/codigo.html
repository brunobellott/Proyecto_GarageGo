<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verificar código</title>
    <link rel="stylesheet" href="../../styles/estilosLogin/styles.css" />
    >
  </head>
  <!--  <input
            type="password"
            id="password"
            placeholder="NUEVA CONTRASEÑA"
            required
          />-->
  <body>
    <div class="DivPrincipal">
      <div class="CajasdeRegistro">
        <!-- LOGO -->
        <img
          src="../../../public/assets/icons/logo.png"
          alt="GarageGo"
          class="logo"
        />
        <p class="recuperarContraseña">
          Hemos enviado un código de verificación a su correo electrónico.
          <img
            class="imageMail"
            src="../../../public/assets/icons/gmail.png"
            alt="email logo"
          />
        </p>
        <p class="subtitulo">INTRODUCE EL CÓDIGO</p>

        <form action="verificar_codigo.php" method="POST">
          <!-- Inputs código -->
          <div class="codigo-container">
            <input type="text" maxlength="1" class="codigo" />
            <input type="text" maxlength="1" class="codigo" />
            <input type="text" maxlength="1" class="codigo" />
            <input type="text" maxlength="1" class="codigo" />
          </div>

          <!-- Botones -->

          <button type="submit" class="boton">ACCEDER</button>
        </form>

        <p class="reenviar">VOLVER A ENVIAR EL CÓDIGO</p>
        <button type="button" class="volver" onclick="volverPagina()">←</button>
      </div>
    </div>

    <script>
      const inputs = document.querySelectorAll(".codigo");

      inputs.forEach((input, index) => {
        input.addEventListener("input", () => {
          if (input.value.length === 1 && index < inputs.length - 1) {
            inputs[index + 1].focus();
          }
        });

        input.addEventListener("keydown", (e) => {
          if (e.key === "Backspace" && input.value === "" && index > 0) {
            inputs[index - 1].focus();
          }
        });
      });
    </script>
    <script src="../../js/volverPaginas.js"></script>
  </body>
</html>
