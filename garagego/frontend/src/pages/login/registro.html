<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro</title>
    <link rel="stylesheet" href="../../styles/estilosLogin/styles.css" />
  </head>

  <body>
    <div class="DivPrincipal">
      <div class="CajasdeRegistro">
        <!-- LOGO -->
        <img
          src="../../../public/assets/icons/logo.png"
          alt="GarageGo"
          class="logo"
        />

        <h2>REGISTRO</h2>

        <form id="registerForm">
          <!-- GOOGLE -->
          <button type="button" class="google-btn">
            <img
              src="../../../public/assets/icons/google.png"
              class="google-icon"
            />
            INGRESAR CON GOOGLE
          </button>
          <!---------------------------------------FORM REGISTRO--------------------------------------->
          <!--FIX---
          AGREGUE APELLIDO AL REGISTRO
          Los inputs tienen limite de caracteres
          AGREGUE VER CONTRASEÑA CON JS MODULARIZADO
          AGREGUE CHECKBOX TERMINOS Y CONDICIONES-->

          <!-- Nombre -->
          <input
            type="text"
            id="nombre"
            placeholder="NOMBRE"
            maxlength="50"
            required
          />
          <!-- Apellido -->
          <input
            type="text"
            id="apellido"
            placeholder="APELLIDO"
            maxlength="50"
            required
          />
          <!-- Email -->
          <input
            type="email"
            id="email"
            placeholder="EMAIL"
            maxlength="100"
            required
          />
          <!-- Contraseña -->

          <div class="contenedor-password">
            <input
              type="password"
              id="password"
              placeholder="CONTRASEÑA"
              minlength="6"
              maxlength="64"
              required
            />

            <button type="button" class="btn-password" id="togglePasswordBtn">
              👁
            </button>
          </div>

          <!-- Términos -->

          <div class="contenedor-terminos">
            <input type="checkbox" id="terminos" required />

            <label for="terminos"> Acepto los términos y condiciones </label>
          </div>

          <!---------------------------------------------------------------------------------->

          <div class="acciones">
            <button type="button" class="volver" onclick="history.back()">
              ←
            </button>

            <button type="submit" class="boton">REGISTRARSE</button>
          </div>
        </form>
      </div>
    </div>

    <script src="../../js/verContraseña.js"></script>
    <script>
      document
        .getElementById("registerForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const nombre = document.getElementById("nombre").value;
          const email = document.getElementById("email").value;
          const password = document.getElementById("password").value;

          const res = await fetch("http://localhost:3000/register", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ nombre, email, password }),
          });

          const data = await res.json();
          console.log(data); // 👈 DEBUG

          if (data.success) {
            alert("Usuario registrado");
            window.location.href = "index.html";
          } else {
            alert(data.message);
          }
        });
    </script>
  </body>
</html>
