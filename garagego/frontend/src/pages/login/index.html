<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="../../styles/estilosLogin/styles.css" />
  </head>

  <body>
    <div class="DivPrincipal">
      <div class="CajasdeRegistro">
        <!-- LOGO -->
        <img
          src="../../../public/assets/icons/logo.png"
          alt="GarageGo"
          class="logo"
        />

        <h2>INICIAR SESIÓN</h2>
        <form id="loginForm">
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Email"
            maxlength="100"
            autocomplete="email"
            required
          />

          <div class="contenedor-password">
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Contraseña"
              minlength="6"
              maxlength="64"
              autocomplete="current-password"
              required
            />

            <button type="button" class="btn-password" id="togglePasswordBtn">
              👁
            </button>
          </div>
            <button
              type="button"
              class="boton"
              onclick="window.location.href = '../home/principal.html'">
              ACCEDER
            </button>
       

        <button
          type="button"
          class="boton secundario"
          onclick="window.location.href = 'registro.html'"
        >
          REGISTRARSE
        </button>

        <p class="registroLink">
          <a href="recuperar.html">¿OLVIDÓ SU CONTRASEÑA?</a>
        </p>
      </div>
    </div>

    <script src="../../js/verContraseña.js"></script>

    <script>
      document
        .getElementById("loginForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const email = document.getElementById("email").value;
          const password = document.getElementById("password").value;

          const res = await fetch("http://localhost:3000/login", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ email, password }),
          });

          const data = await res.json();

          if (data.success) {
            window.location.href = "principal.html";
          } else {
            alert(data.message);
          }
        });
    </script>
  </body>
</html>
