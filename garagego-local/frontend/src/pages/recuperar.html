<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recuperar contraseña</title>
    <link rel="stylesheet" href="../styles/styles.css" />
  </head>

  <body>
    <div class="DivPrincipal">
      <div class="CajasdeRegistro">
        <!-- LOGO -->
        <img
          src="../../public/assets/icons/logo.png"
          alt="GarageGo"
          class="logo"
        />

        <h2>RECUPERAR CONTRASEÑA</h2>

        <form id="recuperarForm">
          <!-- Inputs -->
          <input type="email" id="email" placeholder="MAIL" required />

          <!-- Botones -->
          <div class="acciones">
            <button type="button" class="volver" onclick="volverPagina()">
              ←
            </button>
            <button
              type="submit"
              class="boton"
            >
              CAMBIAR CONTRASEÑA
            </button>
          </div>
        </form>
      </div>
    </div>
    <script src="../js/volverPaginas.js"></script>
    <script>

      document
        .getElementById("recuperarForm")
        .addEventListener("submit", async (e) => {

          e.preventDefault();

          alert("Entró al submit");

          const email =
            document.getElementById("email").value;

          console.log(email);

          const res = await fetch(
            "http://localhost:3000/enviar-codigo",
            {
              method: "POST",

              headers: {
                "Content-Type": "application/json"
              },

              body: JSON.stringify({
                email
              })
            }
          );

          const data = await res.json();

          console.log(data);

          if (data.success) {

            localStorage.setItem(
              "emailRecuperacion",
              email
            );

            alert("Código enviado");

            window.location.href =
              "codigo.html";

          } else {

            alert("error no se mando codigo");
          }

        });
</script>
  </body>
</html>
