<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../styles/styles.css" />
  <title>Nueva Contraseña</title>

</head>

<body>

  <div class="DivPrincipal">
    <div class="CajasdeRegistro">
      <!-- LOGO -->
      <img src="../../public/assets/icons/logo.png" alt="GarageGo" class="logo" />

      <form id="recuperarForm">
        <!-- Inputs -->
        <input type="password" id="password" placeholder="NUEVA CONTRASEÑA" required />


        <input type="password" id="password" placeholder="CONFIRMAR CONTRASEÑA">

        <button type="submit" id="guardar" class="boton">
        CAMBIAR CONTRASEÑA
        </button>
      </form>
    </div>
  </div>

</body>

</html>

<script>
  
document.getElementById("guardar")
.addEventListener("click", async () => {

  const password =
    document.getElementById("password").value;

  const email =
    localStorage.getItem(
      "emailRecuperacion"
    );

  const res = await fetch(
    "http://localhost:3000/nueva-password",
    {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        email,
        password
      })
    }
  );

  const data = await res.json();

  if(data.success){

    alert("Contraseña actualizada");

    window.location.href = "index.html";

  } else {

    alert("Error");
  }
});

</script>
